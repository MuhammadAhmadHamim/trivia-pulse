<svg xmlns="http://www.w3.org/2000/svg" width="740" height="132" viewBox="0 0 740 132">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#161616" stroke-width="0.4"/>
    </pattern>
    <filter id="silver-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="top-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e8e8e8" stop-opacity="0.1"/>
      <stop offset="30%"  stop-color="#e8e8e8" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#e8e8e8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e8e8e8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="740" height="132" fill="#0a0a0a" rx="10"/>
  <rect width="740" height="132" fill="url(#grid)" rx="10" opacity="1"/>
  <rect x="0" y="0" width="740" height="2" fill="url(#top-bar)" rx="2"/>
  <rect x="0" y="2" width="2" height="130" fill="#e8e8e8" opacity="0.08"/>
  <rect x="738" y="2" width="2" height="130" fill="#e8e8e8" opacity="0.04"/>
  <path d="M 18 14 L 18 26 L 30 26" fill="none" stroke="#e8e8e8" stroke-width="1.6" stroke-linecap="square" filter="url(#silver-glow)"/>
  <path d="M 722 14 L 722 26 L 710 26" fill="none" stroke="#e8e8e8" stroke-width="1.6" stroke-linecap="square" filter="url(#silver-glow)"/>
  <path d="M 18 118 L 18 106 L 30 106" fill="none" stroke="#e8e8e8" stroke-width="1.6" stroke-linecap="square" opacity="0.35"/>
  <path d="M 722 118 L 722 106 L 710 106" fill="none" stroke="#e8e8e8" stroke-width="1.6" stroke-linecap="square" opacity="0.35"/>
  <text x="36" y="34" font-family="Courier New, Courier, monospace" font-size="10" font-weight="bold" fill="#e8e8e8" letter-spacing="4" filter="url(#silver-glow)">TRIVIA_PULSE</text>
  <circle cx="148" cy="30" r="2.5" fill="#e8e8e8" filter="url(#silver-glow)">
    <animate attributeName="opacity" values="1;0;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="704" y="34" font-family="Courier New, Courier, monospace" font-size="9" fill="#a0a0a0" text-anchor="end" letter-spacing="1" opacity="0.6">SYS::RANDOM_FACT</text>
  <line x1="36" y1="46" x2="704" y2="46" stroke="#c0c0c0" stroke-width="0.5" opacity="0.3"/>
  <text x="36" y="72" font-family="Courier New, Courier, monospace" font-size="12" fill="#e8e8e8" filter="url(#text-glow)">~/fact $</text>
  <text x="36" y="88" font-family="Courier New, Courier, monospace" font-size="13.5" fill="#e8ff00" letter-spacing="0.3">You cannot hum while holding your nose closed. Try it.</text>

  <rect x="0" y="92" width="740" height="40" fill="url(#fade-bottom)" rx="10"/>
  <line x1="36" y1="104" x2="704" y2="104" stroke="#c0c0c0" stroke-width="0.5" opacity="0.15"/>
  <text x="36" y="114" font-family="Courier New, Courier, monospace" font-size="9" fill="#a0a0a0" letter-spacing="1" opacity="0.5">UPDATED :: 30 Apr 2026 · 02:42 UTC</text>
  <text x="704" y="114" font-family="Courier New, Courier, monospace" font-size="9" fill="#a0a0a0" text-anchor="end" letter-spacing="1" opacity="0.4">uselessfacts.jsph.pl</text>
</svg>